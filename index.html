<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07070C">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<title>Pulse</title>
<style>
:root{
  --bg:#07070C; --card:rgba(255,255,255,.045); --card2:rgba(255,255,255,.085);
  --border:rgba(255,255,255,.09); --text:#F4F5F9; --dim:#9298A8; --dim2:#5E6374;
  --accent:#4D9FFF; --accent2:#8AB8FF; --violet:#7B5CFF; --good:#34D399; --warn:#F5A524; --bad:#F87171;
  --grad:linear-gradient(135deg,#4D9FFF 0%,#7B5CFF 100%);
  --radius:20px; --tabbar-h:80px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:16px; line-height:1.45; overscroll-behavior-y:none}
body{padding-bottom:calc(var(--tabbar-h) + env(safe-area-inset-bottom))}
body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(560px 320px at 50% -80px, rgba(77,129,255,.16), transparent 70%),
             radial-gradient(420px 260px at 110% 110%, rgba(123,92,255,.08), transparent 70%)}
header,main,.tabbar,.overlay{position:relative; z-index:1}
header{position:sticky; top:0; z-index:30; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  background:rgba(7,7,12,.7); border-bottom:1px solid var(--border);
  padding:calc(12px + env(safe-area-inset-top)) 20px 12px; display:flex; align-items:center; gap:11px}
header .logo{width:30px;height:30px;flex:none; filter:drop-shadow(0 0 10px rgba(77,159,255,.5))}
header h1{font-family:'Space Grotesk',sans-serif; font-size:21px; font-weight:700; letter-spacing:-.02em;
  margin:0; flex:1; background:linear-gradient(90deg,#fff 30%,#8AB8FF); -webkit-background-clip:text;
  background-clip:text; -webkit-text-fill-color:transparent}
header .gear{background:var(--card); border:1px solid var(--border); border-radius:12px; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center; color:var(--dim); cursor:pointer; padding:0}
header .gear svg{width:19px;height:19px}
main{padding:18px 16px 8px; max-width:640px; margin:0 auto}
h2{display:flex; align-items:center; gap:8px; font-family:'Space Grotesk',sans-serif; font-size:13px;
  font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin:24px 4px 12px}
h2 svg{width:15px; height:15px; color:var(--accent)}
.card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin-bottom:13px; overflow:hidden}
.card.tap{cursor:pointer; transition:transform .08s ease, background .15s; padding:0}
.card.tap:active{transform:scale(.985); background:var(--card2)}
.card.tap .pad{padding:15px 16px}
.thumb{width:100%; height:128px; object-fit:cover; object-position:top; display:block;
  border-bottom:1px solid var(--border); background:linear-gradient(135deg,rgba(77,159,255,.10),rgba(123,92,255,.10))}
.thumb.ph{display:flex; align-items:center; justify-content:center; color:var(--dim2)}
.thumb.ph svg{width:28px;height:28px}
.row{display:flex; align-items:center; gap:10px}
.grow{flex:1; min-width:0}
.title{font-weight:700; font-size:16px; letter-spacing:-.015em}
.sub{color:var(--dim); font-size:13px; margin-top:4px}
.chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:11px}
.chip{font-size:11.5px; font-weight:600; padding:3.5px 10px; border-radius:99px;
  background:rgba(77,159,255,.12); color:var(--accent2); border:1px solid rgba(77,159,255,.22)}
.chip.hold{background:rgba(245,165,36,.13); color:var(--warn); border-color:rgba(245,165,36,.3)}
.badge{font-size:11px; font-weight:700; padding:4px 9px; border-radius:8px; flex:none; letter-spacing:.01em}
.badge.sched{background:rgba(77,159,255,.15); color:var(--accent2)}
.badge.pool{background:rgba(255,255,255,.08); color:var(--dim)}
.badge.pub{background:rgba(52,211,153,.13); color:var(--good)}
.btn{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:15px;
  border-radius:15px; border:none; font-size:15.5px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif;
  background:var(--grad); color:#fff; margin-top:12px; box-shadow:0 6px 22px rgba(86,199,255,.22)}
.btn svg{width:18px;height:18px}
.btn.ghost{background:var(--card2); color:var(--text); border:1px solid var(--border); box-shadow:none}
.btn.warn{background:rgba(245,165,36,.14); color:var(--warn); border:1px solid rgba(245,165,36,.3); box-shadow:none}
.btn:disabled{opacity:.45}
input,textarea,select{width:100%; background:rgba(255,255,255,.06); border:1px solid var(--border);
  border-radius:14px; color:var(--text); font-size:16px; padding:13px; margin-top:8px;
  font-family:'Inter',sans-serif; outline:none; -webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(77,159,255,.15)}
textarea{min-height:130px; resize:vertical; line-height:1.5}
label{font-size:12.5px; font-weight:700; color:var(--dim); display:block; margin-top:15px;
  text-transform:uppercase; letter-spacing:.06em}
.tabbar{position:fixed; bottom:0; left:0; right:0; z-index:40; display:flex;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  background:rgba(7,7,12,.78); border-top:1px solid var(--border);
  padding:9px 8px calc(9px + env(safe-area-inset-bottom))}
.tabbar button{flex:1; background:none; border:none; color:var(--dim2); font-size:10.5px;
  font-weight:600; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:5px 0; font-family:'Inter',sans-serif; border-radius:12px}
.tabbar button svg{width:23px; height:23px}
.tabbar button.on{color:var(--accent2)}
.tabbar button.on svg{filter:drop-shadow(0 0 9px rgba(77,159,255,.65))}
.overlay{position:fixed; inset:0; z-index:50; background:var(--bg); overflow-y:auto; display:none;
  padding-bottom:40px}
.overlay.show{display:block}
.overlay .bar{position:sticky; top:0; z-index:5; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  background:rgba(7,7,12,.82); border-bottom:1px solid var(--border);
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px; display:flex; align-items:center; gap:12px}
.overlay .bar button{background:none; border:none; color:var(--accent); font-size:16px; font-weight:700;
  cursor:pointer; padding:4px; font-family:'Inter',sans-serif}
.overlay .bar .t{flex:1; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:center}
.overlay .inner{padding:16px; max-width:640px; margin:0 auto}
.postbody{white-space:pre-wrap; font-size:15.5px; line-height:1.58; background:var(--card);
  border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-top:12px}
.media-img{width:100%; border-radius:var(--radius); border:1px solid var(--border); margin-top:12px; display:block}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:11px}
.stat{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:15px;
  position:relative; overflow:hidden}
.stat::after{content:""; position:absolute; inset:auto -30% -60% auto; width:120px; height:120px;
  background:radial-gradient(closest-side, rgba(77,129,255,.14), transparent)}
.stat .v{font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:700; letter-spacing:-.02em;
  margin-top:4px; background:linear-gradient(90deg,#fff,#8AB8FF); -webkit-background-clip:text;
  background-clip:text; -webkit-text-fill-color:transparent}
.stat .k{font-size:11.5px; color:var(--dim); font-weight:700; text-transform:uppercase; letter-spacing:.07em;
  display:flex; align-items:center; gap:6px}
.stat .k svg{width:14px;height:14px;color:var(--accent)}
.stat .d{font-size:12.5px; font-weight:700; margin-top:3px}
.up{color:var(--good)} .down{color:var(--bad)} .flat{color:var(--dim)}
.tip{display:flex; gap:11px; align-items:flex-start; padding:13px 0; border-bottom:1px solid var(--border)}
.tip:last-child{border-bottom:none}
.tip .e{flex:none; font-size:17px; margin-top:1px}
.tip .x{font-size:14px}
.empty{text-align:center; color:var(--dim); padding:42px 22px; font-size:14.5px; line-height:1.55}
.empty svg{width:38px; height:38px; color:var(--dim2); display:block; margin:0 auto 12px}
#toast{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(var(--tabbar-h) + 18px);
  z-index:99; background:#1A1C28; border:1px solid var(--border); color:var(--text); font-size:14px;
  font-weight:600; padding:12px 19px; border-radius:99px; opacity:0; transition:opacity .25s;
  pointer-events:none; max-width:86vw; text-align:center; box-shadow:0 10px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1}
.spin{display:inline-block; width:17px; height:17px; border:2.5px solid rgba(255,255,255,.2);
  border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
.skel{height:96px; border-radius:var(--radius); background:linear-gradient(100deg,var(--card) 40%,var(--card2) 50%,var(--card) 60%);
  background-size:200% 100%; animation:sh 1.3s infinite; margin-bottom:13px}
@keyframes sh{to{background-position:-200% 0}}
.news-src{font-size:11px; color:var(--accent2); font-weight:700; text-transform:uppercase; letter-spacing:.09em}
a{color:var(--accent2); font-weight:600}
.seg{display:flex; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:3px; margin-top:8px}
.seg button{flex:1; border:none; background:none; color:var(--dim); font-weight:700; font-size:13.5px;
  padding:9px; border-radius:11px; cursor:pointer; font-family:'Inter',sans-serif}
.seg button.on{background:var(--grad); color:#fff}
.hint{font-size:12.5px; color:var(--dim2); margin-top:9px; line-height:1.5}
.auto-note{display:flex; gap:10px; align-items:center; background:rgba(52,211,153,.07);
  border:1px solid rgba(52,211,153,.2); border-radius:var(--radius); padding:13px 15px; margin-bottom:13px}
.auto-note svg{width:20px; height:20px; color:var(--good); flex:none}
.auto-note span{font-size:13px; color:var(--text); opacity:.9}
</style>
</head>
<body>

<header>
  <svg class="logo" viewBox="0 0 32 32" fill="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32">
      <stop stop-color="#4D9FFF"/><stop offset="1" stop-color="#7B5CFF"/></linearGradient></defs>
    <rect width="32" height="32" rx="9" fill="url(#lg)" fill-opacity=".16"/>
    <rect x=".75" y=".75" width="30.5" height="30.5" rx="8.25" stroke="url(#lg)" stroke-opacity=".5" stroke-width="1.5"/>
    <path d="M5 18h5l3-8 4 13 3-9 2 4h5" stroke="url(#lg)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>Pulse</h1>
  <button class="gear" onclick="showTab('settings')" aria-label="Settings"></button>
</header>

<main id="view"></main>

<nav class="tabbar">
  <button id="tab-queue" onclick="showTab('queue')"><span class="ti" data-ic="queue"></span>Queue</button>
  <button id="tab-metrics" onclick="showTab('metrics')"><span class="ti" data-ic="metrics"></span>Metrics</button>
  <button id="tab-compose" onclick="showTab('compose')"><span class="ti" data-ic="compose"></span>Compose</button>
  <button id="tab-news" onclick="showTab('news')"><span class="ti" data-ic="news"></span>News</button>
</nav>

<div class="overlay" id="detail">
  <div class="bar">
    <button onclick="closeDetail()">‹ Back</button>
    <div class="t" id="detail-title"></div>
    <button id="detail-action" onclick="toggleEdit()">Edit</button>
  </div>
  <div class="inner" id="detail-body"></div>
</div>

<div id="toast"></div>

<script>
"use strict";
/* ====== config ====== */
const CFG = { owner:"MatiasR95", repo:"linkedin-writer", branch:"main" };
const API = `https://api.github.com/repos/${CFG.owner}/${CFG.repo}/contents/`;
const CATS = ["auto","assurant-dw","concept","business","industry-news","career","passions"];
const CAT_COLOR = { "assurant-dw":"#4D9FFF", concept:"#7B5CFF", business:"#34D399",
  "industry-news":"#22D3EE", career:"#F5A524", passions:"#F472B6" };

/* ====== icon set (SVG, stroke) ====== */
const IC = {
  queue:'<path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 12.5 9 5 9-5"/><path d="m3 17 9 5 9-5"/>',
  metrics:'<path d="M5 20v-7"/><path d="M12 20V5"/><path d="M19 20v-11"/><path d="M3 20h18"/>',
  compose:'<path d="M16.5 3.8a2.3 2.3 0 0 1 3.3 3.3L8 19l-5 1.3L4.3 15 16.5 3.8Z"/>',
  news:'<circle cx="12" cy="12" r="9"/><path d="M3.5 9.5h17M3.5 14.5h17M12 3a14 14 0 0 0 0 18M12 3a14 14 0 0 1 0 18"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.5-2.4 1a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.5 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 2 1.2L10 21h4l.5-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.5-2-1.5c.07-.4.1-.8.1-1.2Z"/>',
  eye:'<path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12Z"/><circle cx="12" cy="12" r="2.8"/>',
  trend:'<path d="m3 16 6-6 4 4 8-8"/><path d="M15 6h6v6"/>',
  people:'<circle cx="9" cy="8" r="3.2"/><path d="M3.5 19.5c.6-3.2 2.8-5 5.5-5s4.9 1.8 5.5 5"/><circle cx="17" cy="9" r="2.5"/><path d="M16 14.7c2.2.2 3.9 1.8 4.4 4.3"/>',
  sat:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>',
  bot:'<rect x="5" y="8" width="14" height="11" rx="3"/><path d="M12 8V4M8.5 4h7"/><circle cx="9.5" cy="13" r="1"/><circle cx="14.5" cy="13" r="1"/><path d="M9.5 16.5h5"/>',
  img:'<rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="9" cy="10" r="1.8"/><path d="m4 18 5-5 3 3 4-4 4 4"/>',
  moon:'<path d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z"/>',
  alert:'<path d="M12 3 1.8 20.2h20.4L12 3Z"/><path d="M12 10v4.5"/><circle cx="12" cy="17.4" r=".5"/>',
  radar:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><path d="M12 12 18 6"/>',
  send:'<path d="m3 11 18-7-7 18-2.5-7.5L3 11Z"/>',
  key:'<circle cx="8" cy="14" r="4.5"/><path d="m11.5 10.5 8-8M16 5l3 3M13.5 7.5l3 3"/>',
  spark:'<path d="M12 2.5 14 9l6.5 2.2L14 13.5 12 20l-2-6.5L3.5 11 10 9l2-6.5Z"/>'
};
const icon = (n,s=24) => `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none"
  stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${IC[n]||""}</svg>`;

/* ====== utils ====== */
const $ = id => document.getElementById(id);
const token = () => localStorage.getItem("pulse_token") || "";
const enc = s => btoa(unescape(encodeURIComponent(s)));
const dec = s => decodeURIComponent(escape(atob(s.replace(/\n/g,""))));
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(msg, ms=2600){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"), ms); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return ""; const x = new Date(d + "T12:00:00");
  return isNaN(x) ? d : x.toLocaleDateString("en-US",{weekday:"short", month:"short", day:"numeric"}); }

/* ====== GitHub API ====== */
async function gh(path, opts={}){
  const r = await fetch(API + path + (opts.method ? "" : `?ref=${CFG.branch}&_=${Date.now()}`), {
    method: opts.method || "GET",
    headers: Object.assign({
      "Authorization": "Bearer " + token(),
      "Accept": opts.raw ? "application/vnd.github.raw+json" : "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28"
    }, opts.method ? {"Content-Type":"application/json"} : {}),
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (r.status === 404 && opts.ok404) return null;
  if (!r.ok){ const x = await r.text(); throw new Error(`GitHub ${r.status}: ${x.slice(0,160)}`); }
  if (opts.raw) return r.text();
  return r.json();
}
const ghList = (dir) => gh(dir, {ok404:true}).then(x => Array.isArray(x) ? x : []);
const ghText = (path) => gh(path, {raw:true, ok404:true});
const _blobCache = {};
async function ghBlobURL(path){
  if (_blobCache[path]) return _blobCache[path];
  const r = await fetch(API + path + `?ref=${CFG.branch}`, { headers:{
    "Authorization":"Bearer "+token(), "Accept":"application/vnd.github.raw+json"}});
  if(!r.ok) return null;
  const u = URL.createObjectURL(await r.blob());
  _blobCache[path] = u; return u;
}
async function ghPut(path, text, message, sha){
  const body = { message, content: enc(text), branch: CFG.branch };
  if (sha) body.sha = sha;
  return gh(path, { method:"PUT", body });
}
async function ghSha(path){ const m = await gh(path, {ok404:true}); return m && m.sha; }
async function ghDelete(path, message){
  const sha = await ghSha(path); if(!sha) return;
  return gh(path, { method:"DELETE", body:{ message, sha, branch: CFG.branch }});
}

/* ====== post parsing ====== */
function parsePost(name, raw){
  let fm = {}, body = raw;
  const m = raw.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n/);
  if (m){
    body = raw.slice(m[0].length);
    for (const line of m[1].split(/\r?\n/)){
      const i = line.indexOf(":");
      if (i > 0) fm[line.slice(0,i).trim()] = line.slice(i+1).trim().replace(/^["']|["']$/g,"");
    }
  }
  const headIdx = body.search(/\r?\n##\s/);
  const text = (headIdx >= 0 ? body.slice(0, headIdx) : body)
    .replace(/<!--[\s\S]*?-->/g,"").replace(/\n{3,}/g,"\n\n").trim();
  const rest = headIdx >= 0 ? body.slice(headIdx) : "";
  const tags = [...new Set((text.match(/#[A-Za-z0-9]+/g) || []))];
  let cat = fm.category || "";
  if (!cat && fm.topic_tags) cat = fm.topic_tags.replace(/[\[\]]/g,"").split(",")[0].trim();
  return { name, fm, fmBlock: m ? m[0] : "", text, rest, tags, cat, raw };
}
function recompose(p, newText){
  return p.fmBlock + newText.trim() + "\n" + (p.rest ? "\n" + p.rest.replace(/^\r?\n/,"") : "");
}
function catChip(cat){
  if (!cat) return "";
  const c = CAT_COLOR[cat] || "#8AB8FF";
  return `<span class="chip" style="background:${c}1f;color:${c};border-color:${c}3d">${esc(cat)}</span>`;
}

/* ====== tabs ====== */
let cur = "queue";
function showTab(name){
  cur = name;
  ["queue","metrics","compose","news"].forEach(t => {
    const b = $("tab-"+t); if (b) b.classList.toggle("on", t === name);
  });
  closeDetail();
  if (!token() && name !== "settings"){ renderSettings(true); return; }
  ({queue:renderQueue, metrics:renderMetrics, compose:renderCompose,
    news:renderNews, settings:renderSettings})[name]();
}

/* ====== QUEUE ====== */
let queueCache = [];
async function renderQueue(){
  const v = $("view");
  v.innerHTML = `<h2>${icon("queue",15)} Publishing queue</h2><div class='skel'></div><div class='skel'></div>`;
  try{
    const [ready, pool, published, planRaw] = await Promise.all([
      ghList("posts/ready"), ghList("posts/pool"), ghList("posts/published"),
      ghText("data/week-plan.json")]);
    const holds = new Set([...ready, ...pool].filter(f => f.name.endsWith(".hold"))
      .map(f => f.name.replace(/\.hold$/,"")));
    const mds = dir => list => list.filter(f => f.name.endsWith(".md") && !f.name.startsWith("_"))
      .map(f => ({...f, dir}));
    const files = [...mds("posts/ready")(ready), ...mds("posts/pool")(pool)];
    queueCache = await Promise.all(files.map(async f => {
      const raw = await ghText(`${f.dir}/${f.name}`);
      const p = parsePost(f.name, raw);
      p.dir = f.dir; p.held = holds.has(f.name.replace(/\.md$/,""));
      return p;
    }));
    queueCache.sort((a,b) => (a.fm.date||"9999") < (b.fm.date||"9999") ? -1 : 1);

    const today = todayISO();
    let html = "";
    // This week's varying posting slots (from plan_week.py)
    try {
      const plan = planRaw ? JSON.parse(planRaw) : null;
      if (plan && plan.slots && plan.slots.length) {
        const pills = plan.slots.map(s => {
          const done = s.date < today, isToday = s.date === today;
          const wd = s.weekday.slice(0, 3);
          return `<span class="chip" style="${done ? 'opacity:.45' : ''}${isToday ? ';background:rgba(52,211,153,.16);color:var(--good);border-color:rgba(52,211,153,.35)' : ''}">${done ? '✓ ' : ''}${wd} ${esc(s.ar_time)}</span>`;
        }).join("");
        html += `<h2>${icon("metrics",15)} This week's slots <span style="text-transform:none;letter-spacing:0;color:var(--dim2);font-weight:500">· varies weekly</span></h2>
          <div class="card"><div class="hint" style="margin:0 0 9px">Auto-picked days & times (ART), 10 AM–12 PM ET window — different every week.</div>
          <div class="chips" style="margin-top:0">${pills}</div></div>`;
      }
    } catch (e) { /* plan optional */ }
    html += `<h2>${icon("queue",15)} Publishing queue</h2>`;
    if (!queueCache.length) html += `<div class='empty'>${icon("moon")}Queue is empty — the next Create DRAFT routine will refill it.</div>`;
    queueCache.forEach((p,i) => {
      const time = p.fm.scheduled_ar ? p.fm.scheduled_ar.split(" ").slice(1).join(" ") : "11:30 ART";
      const sched = p.fm.date
        ? `<span class="badge sched">${p.fm.date === today ? "TODAY" : esc(fmtDate(p.fm.date))} · ${esc(time)}</span>`
        : `<span class="badge pool">pool · next free slot</span>`;
      html += `<div class="card tap" onclick="openDetail(${i})">
        <div class="thumb ph" id="th-${i}">${icon("img")}</div>
        <div class="pad">
        <div class="row"><div class="grow">
          <div class="title">${esc(p.fm.title || p.name)}</div>
          <div class="sub">${sched} ${p.held ? '<span class="chip hold">⏸ HELD</span>' : ""}</div>
        </div><div style="color:var(--dim2);font-size:19px">›</div></div>
        <div class="chips">${catChip(p.cat)}
          ${p.tags.slice(0,4).map(t => `<span class="chip">${esc(t)}</span>`).join("")}</div>
        </div>
      </div>`;
    });
    const pubMd = published.filter(f => f.name.endsWith(".md")).slice(-3).reverse();
    if (pubMd.length){
      html += `<h2>${icon("spark",15)} Recently published</h2>`;
      pubMd.forEach(f => { html += `<div class="card"><div class="row"><div class="grow">
        <div class="title" style="font-size:14.5px">${esc(f.name.replace(/\.md$/,""))}</div>
        </div><span class="badge pub">✓ live</span></div></div>`; });
    }
    v.innerHTML = html;
    queueCache.forEach(async (p,i) => {                       // lazy thumbnails
      if (!p.fm.media) return;
      const u = await ghBlobURL(p.fm.media).catch(()=>null);
      const el = $("th-"+i);
      if (u && el) el.outerHTML = `<img class="thumb" id="th-${i}" src="${u}" alt="">`;
    });
  }catch(e){ v.innerHTML = `<div class='empty'>${icon("alert")}${esc(e.message)}</div>`; }
}

/* ====== detail / edit ====== */
let detailPost = null, editing = false;
async function openDetail(i){
  detailPost = queueCache[i]; editing = false;
  $("detail-title").textContent = detailPost.fm.title || detailPost.name;
  $("detail-action").textContent = "Edit";
  const d = $("detail-body");
  const p = detailPost;
  const when = p.fm.date
    ? `Publishes <b>${esc(fmtDate(p.fm.date))}</b>${p.fm.scheduled_ar ? " at " + esc(p.fm.scheduled_ar.split(" ").slice(1).join(" ")) : ""} ${p.fm.scheduled_et ? "(" + esc(p.fm.scheduled_et.split(" ").slice(1).join(" ")) + ")" : ""}`
    : "In the pool — publishes on the next free weekday slot";
  d.innerHTML = `
    <div class="sub" style="font-size:14px">${when}</div>
    <div class="chips">${catChip(p.cat)}
      ${p.tags.map(t => `<span class="chip">${esc(t)}</span>`).join("")}
      ${p.held ? '<span class="chip hold">⏸ HELD — will not publish</span>' : ""}</div>
    <div id="media-slot"></div>
    <div class="postbody" id="post-text">${esc(p.text)}</div>
    <button class="btn warn" id="hold-btn" onclick="toggleHold()">${p.held ? "▶ Release hold (allow publishing)" : "⏸ Hold this post (block publishing)"}</button>`;
  $("detail").classList.add("show"); window.scrollTo(0,0);
  if (p.fm.media){
    const url = await ghBlobURL(p.fm.media).catch(()=>null);
    if (url) $("media-slot").innerHTML = `<img class="media-img" src="${url}" alt="post media">`;
  }
}
function closeDetail(){ $("detail").classList.remove("show"); }
function toggleEdit(){
  if (!detailPost) return;
  const slot = $("post-text"), btn = $("detail-action");
  if (!editing){
    editing = true; btn.textContent = "Save";
    slot.outerHTML = `<textarea id="post-text" style="min-height:55vh; margin-top:12px">${esc(detailPost.text)}</textarea>`;
  } else {
    saveEdit();
  }
}
async function saveEdit(){
  const btn = $("detail-action"); btn.innerHTML = "<span class='spin'></span>";
  try{
    const path = `${detailPost.dir}/${detailPost.name}`;
    const newText = $("post-text").value;
    const sha = await ghSha(path);
    await ghPut(path, recompose(detailPost, newText), `Edit ${detailPost.name} via Pulse`, sha);
    detailPost.text = newText.trim(); editing = false; btn.textContent = "Edit";
    document.querySelector("#post-text").outerHTML =
      `<div class="postbody" id="post-text">${esc(detailPost.text)}</div>`;
    toast("✅ Saved — the publisher will use this version");
  }catch(e){ btn.textContent = "Save"; toast("⚠️ " + e.message, 4000); }
}
async function toggleHold(){
  const p = detailPost, base = p.name.replace(/\.md$/,""), path = `${p.dir}/${base}.hold`;
  const b = $("hold-btn"); b.disabled = true;
  try{
    if (p.held){ await ghDelete(path, `Release hold on ${base} via Pulse`); p.held = false;
      toast("▶ Released — back in the publishing queue"); }
    else { await ghPut(path, "held via Pulse app " + new Date().toISOString(), `Hold ${base} via Pulse`); p.held = true;
      toast("⏸ Held — it will NOT publish until released"); }
    b.disabled = false;
    b.textContent = p.held ? "▶ Release hold (allow publishing)" : "⏸ Hold this post (block publishing)";
  }catch(e){ b.disabled = false; toast("⚠️ " + e.message, 4000); }
}

/* ====== METRICS (fully automated — harvested from LinkedIn notification emails) ====== */
function csvRows(text){
  if (!text) return [];
  const lines = text.trim().split(/\r?\n/);
  const head = lines[0].split(",");
  return lines.slice(1).map(l => { const c = l.split(",");
    const o = {}; head.forEach((h,i) => o[h.trim()] = (c[i]||"").trim()); return o; });
}
function delta(now, prev){
  const a = parseFloat(now), b = parseFloat(prev);
  if (isNaN(a) || isNaN(b)) return "";
  if (b === 0) return a > 0 ? `<span class="d up">new ↑</span>` : "";
  const pc = Math.round((a-b)/b*100);
  if (pc === 0) return `<span class="d flat">→ steady</span>`;
  return pc > 0 ? `<span class="d up">↑ ${pc}%</span>` : `<span class="d down">↓ ${Math.abs(pc)}%</span>`;
}
async function renderMetrics(){
  const v = $("view");
  v.innerHTML = `<h2>${icon("metrics",15)} Profile metrics</h2><div class='skel'></div><div class='skel'></div>`;
  try{
    const [profCsv, perfCsv] = await Promise.all([
      ghText("data/profile-metrics.csv"), ghText("data/performance.csv")]);
    const prof = csvRows(profCsv), perf = csvRows(perfCsv);
    const last = prof[prof.length-1] || {}, prev = prof[prof.length-2] || {};
    const stat = (k, label, ic) => `<div class="stat"><div class="k">${icon(ic,14)} ${label}</div>
      <div class="v">${esc(last[k] || "—")}</div>${delta(last[k], prev[k])}</div>`;
    let html = `<h2>${icon("metrics",15)} Profile · ${last.date ? "as of " + esc(fmtDate(last.date)) : "no data yet"}</h2>
      <div class="auto-note">${icon("bot",20)}<span><b>Auto-pilot:</b> the Metrics Harvester routine reads
      LinkedIn's notification emails weekly and fills these numbers — nothing to do here.</span></div>
      <div class="stat-grid">
        ${stat("profile_views","Profile views","eye")}
        ${stat("post_impressions","Impressions","trend")}
        ${stat("new_connections","Connections","people")}
        ${stat("followers","Followers","sat")}
      </div>
      <h2>${icon("spark",15)} Suggested actions</h2><div class="card">${suggestions(prof, perf)}</div>
      <h2>${icon("queue",15)} Per-post engagement</h2>`;
    if (perf.length === 0) html += `<div class='empty'>${icon("moon")}No posts logged yet.</div>`;
    perf.slice(-6).reverse().forEach(r => {
      html += `<div class="card"><div class="title" style="font-size:14.5px">${esc(r.slug)}</div>
        <div class="sub">${esc(fmtDate(r.date))} ${r.impressions
          ? `· 📈 ${esc(r.impressions)} · 👍 ${esc(r.reactions)} · 💬 ${esc(r.comments)}`
          : "· <i>awaiting harvest</i>"}</div></div>`;
    });
    v.innerHTML = html;
  }catch(e){ v.innerHTML = `<div class='empty'>${icon("alert")}${esc(e.message)}</div>`; }
}
function suggestions(prof, perf){
  const tips = [];
  const last = prof[prof.length-1], prev = prof[prof.length-2];
  if (prof.length < 2)
    tips.push(["🤖","Once the harvester has 2+ weeks of data, trends and sharper advice appear here automatically. Make sure LinkedIn email notifications are ON (LinkedIn → Settings → Notifications → Email)."]);
  if (last && prev){
    const d = (k) => { const a=+last[k], b=+prev[k]; return (isNaN(a)||isNaN(b)||!b) ? 0 : (a-b)/b; };
    if (d("post_impressions") < -0.1) tips.push(["⏰","Impressions dipped — reply to every comment within the first hour after publishing; LinkedIn boosts posts with early conversation."]);
    if (d("post_impressions") > 0.1) tips.push(["🔥","Impressions are climbing — keep the current cadence and double down on the category of your last top post."]);
    if (d("profile_views") < -0.1) tips.push(["💬","Profile views fell — spend 10–15 min/day commenting (genuinely) on posts from data/BI voices; comments drive profile visits."]);
    if (d("new_connections") <= 0) tips.push(["🤝","Send 3–5 personalized invites this week to people who reacted or commented on your posts — warm invites convert best."]);
  }
  const withNum = perf.filter(r => +r.impressions > 0);
  if (withNum.length >= 2){
    const best = withNum.reduce((a,b) => +a.impressions > +b.impressions ? a : b);
    tips.push(["🏆",`Your best recent post is <b>${esc(best.slug)}</b> (${esc(best.impressions)} impressions) — its angle (<i>${esc(best.hook_type||"?")}</i>) is worth repeating.`]);
    const lowC = withNum.filter(r => +r.comments / +r.impressions < 0.003).length;
    if (lowC >= 2) tips.push(["❓","Comments are low relative to reach — end with one specific, easy-to-answer question instead of a broad 'thoughts?'"]);
  }
  if (!tips.length) tips.push(["✨","Everything looks steady — consistency beats intensity on LinkedIn."]);
  return tips.map(t => `<div class="tip"><span class="e">${t[0]}</span><span class="x">${t[1]}</span></div>`).join("");
}

/* ====== COMPOSE ====== */
function renderCompose(){
  $("view").innerHTML = `
    <h2>${icon("compose",15)} New post idea → Claude drafts it</h2>
    <div class="card">
      <div class="hint">Braindump something from work, a win, a lesson, someone to thank — Claude turns it into a
      full bilingual post on the next draft run (or sooner if you mark it priority). Write in English or Spanish, both work. 🇺🇸🇦🇷</div>
      <label>💡 Your idea</label>
      <textarea id="c-idea" placeholder="e.g. Today a teammate helped me untangle a tricky join and it reminded me why pairing on SQL beats struggling alone…"></textarea>
      <label>🙌 Anyone to tag / credit? (optional)</label>
      <input id="c-tag" placeholder="e.g. María García — helped me debug the pipeline">
      <label>🗂 Category hint</label>
      <select id="c-cat">${CATS.map(c => `<option>${c}</option>`).join("")}</select>
      <label>⚡ Priority</label>
      <div class="seg" id="c-prio">
        <button class="on" onclick="setPrio(this,'next-draft')">Use for next draft</button>
        <button onclick="setPrio(this,'whenever')">Whenever it fits</button>
      </div>
      <button class="btn" id="c-save" onclick="saveIdea()">${icon("send",18)} Send to Claude</button>
    </div>`;
}
let prio = "next-draft";
function setPrio(btn, p){ prio = p;
  btn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("on"));
  btn.classList.add("on"); }
async function saveIdea(){
  const idea = $("c-idea").value.trim();
  if (idea.length < 10){ toast("Tell me a bit more 🙂"); return; }
  const b = $("c-save"); b.disabled = true; b.innerHTML = "<span class='spin'></span>";
  try{
    const path = "ideas/inbox.md";
    let text = await ghText(path);
    if (!text) text = "# Idea Inbox\n";
    const entry = `\n## 💡 ${todayISO()} — from Pulse (status: NEW)\n` +
      `- **Idea:** ${idea.replace(/\r?\n/g," / ")}\n` +
      ($("c-tag").value.trim() ? `- **Tag/credit:** ${$("c-tag").value.trim()}\n` : "") +
      `- **Category hint:** ${$("c-cat").value}\n- **Priority:** ${prio}\n`;
    await ghPut(path, text.replace(/\n*$/,"\n") + entry, `Idea via Pulse: ${idea.slice(0,50)}`, await ghSha(path));
    $("c-idea").value = ""; $("c-tag").value = "";
    toast("✅ Sent! Claude will draft it on the next run");
  }catch(e){ toast("⚠️ " + e.message, 4000); }
  b.disabled = false; b.innerHTML = `${icon("send",18)} Send to Claude`;
}

/* ====== NEWS ====== */
async function renderNews(){
  const v = $("view");
  v.innerHTML = `<h2>${icon("news",15)} Trending · Data · AI · Tech</h2><div class='skel'></div><div class='skel'></div>`;
  try{
    const raw = await ghText("data/trending.json");
    const feed = raw ? JSON.parse(raw) : null;
    if (!feed || !feed.items || !feed.items.length){
      v.innerHTML = `<h2>${icon("news",15)} Trending · Data · AI · Tech</h2>
        <div class="empty">${icon("radar")}No feed yet — the daily News Scout routine fills this
        each morning with what's trending on LinkedIn & X about Data, BI, AI and tech.</div>`;
      return;
    }
    let html = `<h2>${icon("news",15)} Trending · updated ${esc(fmtDate((feed.updated||"").slice(0,10)))}</h2>`;
    feed.items.forEach(it => {
      html += `<div class="card">
        <div class="news-src">${esc(it.source || "web")}</div>
        <div class="title" style="margin-top:5px">${esc(it.title)}</div>
        <div class="sub" style="margin-top:7px; color:var(--text); opacity:.85; font-size:14px">${esc(it.summary || "")}</div>
        <div class="chips">${(it.tags||[]).map(t => `<span class="chip">${esc(t)}</span>`).join("")}</div>
        ${it.url ? `<div style="margin-top:11px"><a href="${esc(it.url)}" target="_blank" rel="noopener">Read more →</a></div>` : ""}
        ${it.angle ? `<div class="hint">💡 Post angle: ${esc(it.angle)}</div>` : ""}
      </div>`;
    });
    v.innerHTML = html;
  }catch(e){ v.innerHTML = `<div class='empty'>${icon("alert")}${esc(e.message)}</div>`; }
}

/* ====== SETTINGS ====== */
function renderSettings(firstRun){
  $("view").innerHTML = `
    ${firstRun ? `<div class="card" style="border-color:rgba(77,159,255,.4)">
      <div class="title">👋 Welcome to Pulse</div>
      <div class="sub" style="margin-top:6px">Your LinkedIn engine's remote control. One thing to set up:
      a GitHub token so the app can read your private content repo. Takes 2 minutes, once.</div></div>`
      : `<h2>${icon("gear",15)} Settings</h2>`}
    <div class="card">
      <div class="title" style="font-size:15px; display:flex; align-items:center; gap:8px">${icon("key",17)} GitHub token</div>
      <div class="hint">Create a <b>fine-grained personal access token</b> at
      github.com → Settings → Developer settings → Fine-grained tokens:<br><br>
      • Repository access: <b>only ${CFG.owner}/${CFG.repo}</b><br>
      • Permissions → Contents: <b>Read and write</b><br>
      • Expiration: up to you (you'll re-paste when it expires)<br><br>
      Paste it below — it stays only on this phone (local storage), never sent anywhere except github.com.</div>
      <input id="s-token" type="password" placeholder="${token() ? "•••••••• (token saved)" : "github_pat_…"}" autocomplete="off">
      <button class="btn" onclick="saveToken()">Save & test connection</button>
      ${token() ? `<button class="btn ghost" onclick="localStorage.removeItem('pulse_token');toast('Token removed');renderSettings()">Sign out (remove token)</button>` : ""}
    </div>
    <div class="card">
      <div class="title" style="font-size:15px; display:flex; align-items:center; gap:8px">${icon("bot",17)} How it works</div>
      <div class="hint">Everything runs in the cloud whether or not you open this app: routines draft posts,
      publish weekdays at 11:30 ART, harvest your LinkedIn metrics from notification emails, and scout
      trending news. Pulse is the window — see the queue, edit a post (it commits straight to the repo),
      hold/release publishing, send Claude ideas.</div>
    </div>`;
}
async function saveToken(){
  const t = $("s-token").value.trim();
  if (!t){ toast("Paste a token first"); return; }
  localStorage.setItem("pulse_token", t);
  try{
    await fetch(`https://api.github.com/repos/${CFG.owner}/${CFG.repo}`, {
      headers:{ "Authorization":"Bearer " + t }}).then(r => { if(!r.ok) throw new Error("HTTP " + r.status); });
    toast("✅ Connected to " + CFG.repo); showTab("queue");
  }catch(e){
    localStorage.removeItem("pulse_token");
    toast("⚠️ Token didn't work (" + e.message + ") — check repo access + Contents permission", 5000);
  }
}

document.querySelector("header .gear").innerHTML = icon("gear", 19);
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
showTab(token() ? "queue" : "settings");
